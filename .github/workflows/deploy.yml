name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to cPanel via cURL webhook
        run: |
          curl -s --max-time 30 \
            "${{ secrets.CPANEL_DEPLOY_WEBHOOK }}" \
            -o /dev/null -w "HTTP Status: %{http_code}\n"
