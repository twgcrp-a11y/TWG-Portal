name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main          # triggers on every push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build React app ──────────────────────────────────────────────────
      - name: Build
        run: npm run build
        env:
          # Add your Firebase / Gemini keys here as GitHub Secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      # ── 5. Deploy dist/ to cPanel via FTP ───────────────────────────────────
      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}        # e.g. ftp.technoworldgroup.com
          username: ${{ secrets.FTP_USERNAME }}    # cPanel FTP username
          password: ${{ secrets.FTP_PASSWORD }}    # cPanel FTP password
          local-dir: ./dist/                       # built output folder
          server-dir: /public_html/portal/         # subdomain root on cPanel
          dangerous-clean-slate: false             # set true to wipe remote before upload
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
